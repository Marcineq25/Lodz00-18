<!doctype html>
<html lang="pl">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/leaflet-measure.css">
    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        .opacity-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #FFFFFF;
            border-left: 4px solid #1A2B4C;
            padding: 12px 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: 'Segoe UI', sans-serif;
        }

        .opacity-control label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #1A2B4C;
            margin-bottom: 6px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 180px;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #C5A880;
            margin-top: -6px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #1A2B4C;
        }

        /* --- STYLIZACJA ETYKIET (PO NAJECHANIU) --- */
        .leaflet-tooltip {
            transition: none !important;
            animation: none !important;
        }

        .leaflet-tooltip.custom-tooltip {
            background-color: rgba(26, 43, 76, 0.95) !important;
            color: #FFFFFF !important;
            border: none !important;
            border-radius: 4px !important;
            box-shadow: none !important;
            font-family: 'Segoe UI', sans-serif !important;
            padding: 6px 10px !important;
            font-size: 12px !important;
            white-space: nowrap !important;
        }

        .leaflet-tooltip-top:before,
        .leaflet-tooltip-bottom:before,
        .leaflet-tooltip-left:before,
        .leaflet-tooltip-right:before {
            display: none !important;
        }

        /* --- STYLIZACJA POPUPÓW (PO KLIKNIĘCIU) --- */
        .leaflet-popup-content-wrapper {
            background-color: rgba(26, 43, 76, 0.95) !important;
            color: #FFFFFF !important;
            border-radius: 4px !important;
            box-shadow: none !important;
            font-family: 'Segoe UI', sans-serif !important;
        }

        .leaflet-popup-tip-container {
            display: none !important;
            /* Usuwa biały trójkąt pod okienkiem */
        }

        .leaflet-popup-content {
            margin: 12px 16px !important;
            font-size: 13px !important;
            line-height: 1.6 !important;
        }

        .leaflet-popup-close-button {
            color: #C5A880 !important;
            /* Złoty krzyżyk zamykania */
            font-size: 18px !important;
            font-weight: bold !important;
            padding: 4px 8px !important;
            text-decoration: none !important;
        }

        .leaflet-popup-close-button:hover {
            color: #FFFFFF !important;
            background: transparent !important;
        }

        /* --- PANELE WARSTW I LEGENDY --- */
        .leaflet-control-layers {
            border-radius: 0 !important;
            border-left: 4px solid #1A2B4C !important;
            font-family: 'Segoe UI', sans-serif !important;
            font-weight: bold;
        }

        .custom-legend {
            background: #FFFFFF;
            border-left: 4px solid #1A2B4C;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: 'Segoe UI', sans-serif;
            max-width: 300px;
        }

        .custom-legend .legend-header {
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #F8F9FA;
            font-size: 13px;
        }

        .custom-legend .legend-body {
            display: none;
            padding: 10px;
            max-height: 35vh;
            overflow-y: auto;
            border-top: 1px solid #E0E0E0;
            font-size: 11px;
        }

        .custom-legend.expanded .legend-body {
            display: block;
        }

        @media screen and (max-width: 600px) {
            .opacity-control {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
            }

            input[type=range] {
                width: 110px;
            }

            .leaflet-control-layers {
                margin-bottom: 15px !important;
                margin-left: 10px !important;
            }

            .custom-legend {
                margin-bottom: 15px !important;
                margin-right: 10px !important;
                max-width: 170px;
            }

            .custom-legend .legend-header {
                font-size: 11px;
                padding: 8px 10px;
            }

            .custom-legend .legend-body {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="opacity-control">
        <label for="layerOpacity">Przezroczystość CLC</label>
        <input type="range" id="layerOpacity" min="0" max="1" step="0.1" value="0.7">
    </div>
    <div id="map"></div>

    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/leaflet-measure.js"></script>
    <script src="data/Corine_Lodz2018_0.js"></script>
    <script src="data/Corine_Lodz2000_1.js"></script>

    <script>
        var map = L.map('map', { zoomControl: false, maxZoom: 28 }).fitBounds([[51.65, 19.25], [51.85, 19.70]]);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        map.createPane('pane_2018'); map.getPane('pane_2018').style.zIndex = 402;
        map.createPane('pane_2000'); map.getPane('pane_2000').style.zIndex = 401;

        var clcDict = {
            '111': 'Zabudowa miejska zwarta', '112': 'Zabudowa miejska luźna',
            '121': 'Tereny przemysłowe/handlowe', '122': 'Tereny komunikacyjne',
            '124': 'Lotniska', '131': 'Eksploatacja odkrywkowa', '133': 'Budowy',
            '141': 'Tereny zielone', '142': 'Tereny sportowe',
            '211': 'Grunty orne', '231': 'Łąki i pastwiska', '242': 'Systemy upraw i działek',
            '243': 'Tereny rolnicze/naturalne',
            '311': 'Lasy liściaste', '312': 'Lasy iglaste', '313': 'Lasy mieszane',
            '324': 'Lasy/Krzewy (stan zmian)'
        };

        function getClcColor(c) {
            var colors = { '111': '#e6004d', '112': '#ff0000', '121': '#cc4df2', '122': '#cc0000', '124': '#e6cce6', '131': '#a600cc', '133': '#ff4dff', '141': '#ffa6ff', '142': '#ffe6ff', '211': '#ffffa8', '231': '#e6e64d', '242': '#ffe64d', '243': '#e6cc4d', '311': '#80ff00', '312': '#00a600', '313': '#4dff00', '324': '#a6f200' };
            return colors[c] || '#cccccc';
        }

        function setupLayer(feature, layer, codeKey) {
            var code = String(feature.properties[codeKey]);
            var name = clcDict[code] || "Kod CLC: " + code;
            var area = feature.properties['pow_ha'] ? feature.properties['pow_ha'].toFixed(2) : "?";

            // Konfiguracja etykiety z wyłączoną animacją
            layer.bindTooltip(name, {
                sticky: true,
                className: 'custom-tooltip'
            });

            // Wymuszenie czyszczenia etykiety po opuszczeniu wektora kursorem
            layer.on('mouseout', function () {
                layer.closeTooltip();
            });

            // Konfiguracja Popupa
            layer.bindPopup("<strong>Typ:</strong> " + name + "<br><strong>Powierzchnia:</strong> " + area + " ha");
        }

        function getLayerStyle(feature, codeKey) {
            var color = getClcColor(feature.properties[codeKey]);
            return { stroke: true, color: color, weight: 0.5, fillOpacity: 1.0, fillColor: color, interactive: true };
        }

        var layer_2018 = L.geoJson(json_Corine_Lodz2018_0, {
            pane: 'pane_2018',
            style: function (f) { return getLayerStyle(f, 'Code_18'); },
            onEachFeature: function (f, l) { setupLayer(f, l, 'Code_18'); }
        }).addTo(map);

        var layer_2000 = L.geoJson(json_Corine_Lodz2000_1, {
            pane: 'pane_2000',
            style: function (f) { return getLayerStyle(f, 'code_00'); },
            onEachFeature: function (f, l) { setupLayer(f, l, 'code_00'); }
        });

        L.control.layers(null, {
            "CLC 2018 (Aktualne)": layer_2018,
            "CLC 2000 (Archiwum)": layer_2000
        }, { collapsed: false, position: 'bottomleft' }).addTo(map);

        document.getElementById('layerOpacity').addEventListener('input', function (e) {
            var v = parseFloat(e.target.value);
            [layer_2018, layer_2000].forEach(l => l.setStyle({ fillOpacity: v, opacity: v }));
        });

        var CustomLegend = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: function () {
                var c = L.DomUtil.create('div', 'custom-legend');
                var h = L.DomUtil.create('div', 'legend-header', c);
                h.innerHTML = '<i class="fas fa-list"></i> Legenda';
                var b = L.DomUtil.create('div', 'legend-body', c);
                b.innerHTML = '<table>' + Object.keys(clcDict).map(k => `<tr><td><div style="width:12px;height:12px;background:${getClcColor(k)};margin-right:6px;border:1px solid #999"></div></td><td>${clcDict[k]}</td></tr>`).join('') + '</table>';

                h.onclick = function () {
                    c.classList.toggle('expanded');
                };

                L.DomEvent.disableClickPropagation(c);
                L.DomEvent.disableScrollPropagation(c);
                return c;
            }
        });
        map.addControl(new CustomLegend());

        document.getElementById('layerOpacity').dispatchEvent(new Event('input'));
    </script>
</body>

</html>
