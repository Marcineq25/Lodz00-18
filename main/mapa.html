<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/leaflet.photon.css">
    <link rel="stylesheet" href="css/leaflet-measure.css">
    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        /* ----------------------------------------------------
           FLAT DESIGN INTERFACE: Suwak Przezroczystości
           ---------------------------------------------------- */
        .opacity-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #FFFFFF;
            border-left: 4px solid #1A2B4C;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: 'Segoe UI', sans-serif;
        }

        .opacity-control label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: #1A2B4C;
            margin-bottom: 8px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 200px;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #C5A880;
            cursor: pointer;
            margin-top: -6px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #1A2B4C;
        }

        /* ----------------------------------------------------
           FLAT DESIGN INTERFACE: Panel Warstw (Checkboxy)
           ---------------------------------------------------- */
        .leaflet-control-layers {
            border-radius: 0 !important;
            border: none !important;
            border-left: 4px solid #1A2B4C !important;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important;
            font-family: 'Segoe UI', sans-serif !important;
            padding: 5px 10px !important;
            background: #FFFFFF !important;
            color: #1A2B4C !important;
            font-weight: bold;
        }

        .leaflet-control-layers label {
            margin-top: 5px;
            margin-bottom: 5px;
        }

        /* ----------------------------------------------------
           FLAT DESIGN INTERFACE: Rozsuwana Legenda
           ---------------------------------------------------- */
        .custom-legend {
            background: #FFFFFF;
            border-left: 4px solid #1A2B4C;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-family: 'Segoe UI', sans-serif;
            color: #1A2B4C;
            pointer-events: auto;
            max-width: 350px;
        }

        .custom-legend .legend-header {
            padding: 12px 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #F8F9FA;
        }

        .custom-legend .legend-header:hover {
            background-color: #E9ECEF;
        }

        .custom-legend .legend-body {
            display: none;
            padding: 10px 15px 15px 15px;
            max-height: 40vh;
            overflow-y: auto;
            border-top: 1px solid #E0E0E0;
            font-size: 12px;
        }

        /* Klasa aktywująca rozwinięcie legendy */
        .custom-legend.expanded .legend-body {
            display: block;
        }

        .custom-legend table {
            border-collapse: collapse;
            width: 100%;
        }

        .custom-legend td {
            padding: 4px 0;
            vertical-align: middle;
        }

        .custom-legend img {
            width: 18px;
            height: 18px;
            border: 1px solid #CCC;
            display: block;
            margin-right: 8px;
        }
    </style>
    <title></title>
</head>

<body>

    <div class="opacity-control">
        <label for="layerOpacity">Przezroczystość warstw CLC</label>
        <input type="range" id="layerOpacity" min="0" max="1" step="0.1" value="0.6">
    </div>

    <div id="map">
    </div>

    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/leaflet.rotatedMarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    <script src="js/leaflet-hash.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/rbush.min.js"></script>
    <script src="js/labelgun.min.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/leaflet.photon.js"></script>
    <script src="js/leaflet-measure.js"></script>

    <script src="data/Corine_Lodz2018_0.js"></script>
    <script src="data/Corine_Lodz2000_1.js"></script>

    <script>
        var map = L.map('map', {
            zoomControl: false, maxZoom: 28, minZoom: 1
        }).fitBounds([[51.56657748466, 19.116177174903164], [51.9830593371323, 19.92864182708758]]);

        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');

        // ---------------------------------------------------------
        // PODKŁAD MAPOWY (CartoDB Positron - Flat Design)
        // ---------------------------------------------------------
        var basemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        });
        basemap.addTo(map);

        var autolinker = new Autolinker({ truncate: { length: 30, location: 'smart' } });

        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }

        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function () { popup.update(); }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var zoomControl = L.control.zoom({ position: 'topleft' }).addTo(map);

        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';

        // ---------------------------------------------------------
        // INICJALIZACJA WARSTWY: CLC 2018
        // ---------------------------------------------------------
        function pop_Corine_Lodz2018_0(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2"><strong>Kod CLC: </strong>' + (feature.properties['Code_18'] !== null ? autolinker.link(String(feature.properties['Code_18'])) : '') + '</td></tr>\
                    <tr><td colspan="2"><strong>Powierzchnia [ha]: </strong>' + (feature.properties['pow_ha'] !== null ? autolinker.link(String(feature.properties['pow_ha'])) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function (e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Corine_Lodz2018_0_0(feature) {
            switch (String(feature.properties['Code_18'])) {
                case '111': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,0,77,1.0)', interactive: true };
                case '112': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,0,0,1.0)', interactive: true };
                case '121': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(204,77,242,1.0)', interactive: true };
                case '122': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(204,0,0,1.0)', interactive: true };
                case '124': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,204,230,1.0)', interactive: true };
                case '131': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(166,0,204,1.0)', interactive: true };
                case '133': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,77,255,1.0)', interactive: true };
                case '141': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,166,255,1.0)', interactive: true };
                case '142': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,230,255,1.0)', interactive: true };
                case '211': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,255,168,1.0)', interactive: true };
                case '231': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,230,77,1.0)', interactive: true };
                case '242': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,230,77,1.0)', interactive: true };
                case '243': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,204,77,1.0)', interactive: true };
                case '311': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(128,255,0,1.0)', interactive: true };
                case '312': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(0,166,0,1.0)', interactive: true };
                case '313': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(77,255,0,1.0)', interactive: true };
                case '324': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(166,242,0,1.0)', interactive: true };
            }
        }

        map.createPane('pane_Corine_Lodz2018_0');
        map.getPane('pane_Corine_Lodz2018_0').style.zIndex = 400;

        var layer_Corine_Lodz2018_0 = new L.geoJson(json_Corine_Lodz2018_0, {
            interactive: true,
            pane: 'pane_Corine_Lodz2018_0',
            onEachFeature: pop_Corine_Lodz2018_0,
            style: style_Corine_Lodz2018_0_0,
        });
        map.addLayer(layer_Corine_Lodz2018_0);

        // ---------------------------------------------------------
        // INICJALIZACJA WARSTWY: CLC 2000
        // ---------------------------------------------------------
        function pop_Corine_Lodz2000_1(feature, layer) {
            var popupContent = '<table>\
                    <tr><td colspan="2"><strong>Kod CLC: </strong>' + (feature.properties['code_00'] !== null ? autolinker.link(String(feature.properties['code_00'])) : '') + '</td></tr>\
                    <tr><td colspan="2"><strong>Powierzchnia [ha]: </strong>' + (feature.properties['pow_ha'] !== null ? autolinker.link(String(feature.properties['pow_ha'])) : '') + '</td></tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
            layer.on('popupopen', function (e) { addClassToPopupIfMedia(content, e.popup); });
            layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Corine_Lodz2000_1_0(feature) {
            switch (String(feature.properties['code_00'])) {
                case '111': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,0,77,1.0)', interactive: true };
                case '112': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,0,0,1.0)', interactive: true };
                case '121': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(204,77,242,1.0)', interactive: true };
                case '122': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(204,0,0,1.0)', interactive: true };
                case '124': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,204,230,1.0)', interactive: true };
                case '131': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(166,0,204,1.0)', interactive: true };
                case '133': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,77,255,1.0)', interactive: true };
                case '141': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,166,255,1.0)', interactive: true };
                case '142': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,230,255,1.0)', interactive: true };
                case '211': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,255,168,1.0)', interactive: true };
                case '231': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,230,77,1.0)', interactive: true };
                case '242': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(255,230,77,1.0)', interactive: true };
                case '243': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(230,204,77,1.0)', interactive: true };
                case '311': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(128,255,0,1.0)', interactive: true };
                case '312': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(0,166,0,1.0)', interactive: true };
                case '313': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(77,255,0,1.0)', interactive: true };
                case '324': return { stroke: false, fill: true, fillOpacity: 1, fillColor: 'rgba(166,242,0,1.0)', interactive: true };
            }
        }

        map.createPane('pane_Corine_Lodz2000_1');
        map.getPane('pane_Corine_Lodz2000_1').style.zIndex = 401;

        var layer_Corine_Lodz2000_1 = new L.geoJson(json_Corine_Lodz2000_1, {
            interactive: true,
            pane: 'pane_Corine_Lodz2000_1',
            onEachFeature: pop_Corine_Lodz2000_1,
            style: style_Corine_Lodz2000_1_0,
        });
        map.addLayer(layer_Corine_Lodz2000_1);

        // ---------------------------------------------------------
        // CHECKBOXY WARSTW (Lewy Dolny Róg)
        // ---------------------------------------------------------
        var overlayLayers = {
            "CLC 2018 (Aktualne)": layer_Corine_Lodz2018_0,
            "CLC 2000 (Archiwum)": layer_Corine_Lodz2000_1
        };

        // Standardowy kontroler dodany do lewego dolnego rogu na zawsze rozłożony
        L.control.layers(null, overlayLayers, {
            collapsed: false,
            position: 'bottomleft'
        }).addTo(map);

        // ---------------------------------------------------------
        // WYSUWANY PANEL LEGENDY (Prawy Dolny Róg)
        // ---------------------------------------------------------
        var CustomLegend = L.Control.extend({
            options: { position: 'bottomright' },
            onAdd: function (map) {
                var container = L.DomUtil.create('div', 'custom-legend');

                // Nagłówek aktywujący
                var header = L.DomUtil.create('div', 'legend-header', container);
                header.innerHTML = '<i class="fas fa-list"></i> Legenda Klasifikacji CLC';

                // Ciało z tabelą wyciągniętą ze starego kodu
                var body = L.DomUtil.create('div', 'legend-body', container);
                body.innerHTML = '<table>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Zabudowamiejskazwarta0.png" /></td><td>Zabudowa miejska zwarta</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Zabudowamiejskaluźna1.png" /></td><td>Zabudowa miejska luźna</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Terenyprzemysłowelubhandlowe2.png" /></td><td>Tereny przemysłowe lub handlowe</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Terenykomunikacyjne3.png" /></td><td>Tereny komunikacyjne</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Lotniska4.png" /></td><td>Lotniska</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Miejsceesploatacjiodkrywkowej5.png" /></td><td>Miejsce esploatacji odkrywkowej</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Budowy6.png" /></td><td>Budowy</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Terenyzielone7.png" /></td><td>Tereny zielone</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Terenysportoweiwypoczynkowe8.png" /></td><td>Tereny sportowe i wypoczynkowe</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Gruntyornepozazasięgiemurządzeńnawadniających9.png" /></td><td>Grunty orne poza zasięgiem urządzeń nawadniających</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Łąkiipastwiska10.png" /></td><td>Łąki i pastwiska</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Złożonesystemyuprawidziałek11.png" /></td><td>Złożone systemy upraw i działek</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Terenyzajętegłównieprzezrolnictwozdużymudziałemterenównaturalnych12.png" /></td><td>Tereny zajęte głównie przez rolnictwo z dużym udziałem terenów naturalnych</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Lasyliściaste13.png" /></td><td>Lasy liściaste</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Lasyiglaste14.png" /></td><td>Lasy iglaste</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Lasymieszane15.png" /></td><td>Lasy mieszane</td></tr>\
                    <tr><td><img src="legend/Corine_Lodz2018_0_Lasyiroslinnośćkrzewiastawstaniezmian16.png" /></td><td>Lasy i roslinność krzewiasta w stanie zmian</td></tr>\
                </table>';

                // Mechanika zwijania/rozwijania
                L.DomEvent.on(header, 'click', function () {
                    if (L.DomUtil.hasClass(container, 'expanded')) {
                        L.DomUtil.removeClass(container, 'expanded');
                    } else {
                        L.DomUtil.addClass(container, 'expanded');
                    }
                });

                // Blokowanie propagacji kliknięć (żeby mapa pod spodem nie reagowała na klikanie w legendę)
                L.DomEvent.disableClickPropagation(container);
                L.DomEvent.disableScrollPropagation(container);

                return container;
            }
        });
        map.addControl(new CustomLegend());

        // ---------------------------------------------------------
        // LOGIKA SUWAKA PRZEZROCZYSTOŚCI
        // ---------------------------------------------------------
        var opacitySlider = document.getElementById('layerOpacity');

        opacitySlider.addEventListener('input', function (e) {
            var opValue = parseFloat(e.target.value);

            if (typeof layer_Corine_Lodz2000_1 !== 'undefined') {
                layer_Corine_Lodz2000_1.setStyle({
                    fillOpacity: opValue,
                    opacity: opValue
                });
            }

            if (typeof layer_Corine_Lodz2018_0 !== 'undefined') {
                layer_Corine_Lodz2018_0.setStyle({
                    fillOpacity: opValue,
                    opacity: opValue
                });
            }
        });

        // Wymuszenie zaaplikowania przezroczystości podczas startu
        opacitySlider.dispatchEvent(new Event('input'));

    </script>
</body>

</html>
